apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skillpulse
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/geetanjalid009/github-actions-kubernetes-masterclass.git
    targetRevision: skillpulse-end-to-end-devops
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: skillpulse
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

