name: SkillPulse DevSecOps GitOps Pipeline

on:
  push:
    branches:
      - main
      - skillpulse-end-to-end-devops
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

permissions:
  contents: write

env:
  DOCKER_USER: geetanjalid009
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  code-quality:
    name: code-quality / validate-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Validate backend Go module
        if: matrix.service == 'backend'
        working-directory: backend
        run: |
          go mod tidy
          go test ./...

      - name: Validate frontend static files
        if: matrix.service == 'frontend'
        run: |
          test -f frontend/index.html
          test -f frontend/nginx.conf
          test -d frontend/css
          test -d frontend/js
          echo "Frontend static files validated"

  secret-scan:
    name: secret-scan / secrets-scan-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Run secret pattern scan
        run: |
          echo "Scanning ${{ matrix.service }} for common secret patterns"
          if grep -RInE "(AWS_SECRET_ACCESS_KEY|AWS_ACCESS_KEY_ID|PRIVATE KEY|password=|token=|api_key=)" ${{ matrix.service }}; then
            echo "Potential secret found in ${{ matrix.service }}"
            exit 1
          else
            echo "No common secret patterns found in ${{ matrix.service }}"
          fi

  dependency-scan:
    name: dependency-scan / dependencies-check-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Backend dependency check
        if: matrix.service == 'backend'
        working-directory: backend
        run: |
          go list -m all
          go mod verify

      - name: Frontend dependency check
        if: matrix.service == 'frontend'
        run: |
          echo "Frontend is static HTML/CSS/JS, no package manager dependency found"

  dockerfile-scan:
    name: dockerfile-scan / validate-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Validate Dockerfile exists
        run: |
          test -f ${{ matrix.service }}/Dockerfile
          echo "Dockerfile found for ${{ matrix.service }}"

      - name: Dockerfile security check
        run: |
          echo "Checking Dockerfile for ${{ matrix.service }}"
          if grep -n "latest" ${{ matrix.service }}/Dockerfile; then
            echo "Warning: latest tag found. Prefer fixed versions in production."
          fi
          if grep -n "USER root" ${{ matrix.service }}/Dockerfile; then
            echo "Root user found. Please use non-root user."
            exit 1
          fi

  k8s-db-validation:
    name: k8s-db-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests only
        run: |
          kubeconform \
            k8s/00-namespace.yaml \
            k8s/10-mysql.yaml \
            k8s/20-backend.yaml \
            k8s/30-frontend.yaml

  build:
    name: build / build-push-${{ matrix.service }}
    runs-on: ubuntu-latest
    needs:
      - code-quality
      - secret-scan
      - dependency-scan
      - dockerfile-scan
      - k8s-db-validation
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: DockerHub Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t $DOCKER_USER/skillpulse-${{ matrix.service }}:${{ github.sha }} \
            -t $DOCKER_USER/skillpulse-${{ matrix.service }}:latest \
            ./${{ matrix.service }}

      - name: Push image
        run: |
          docker push $DOCKER_USER/skillpulse-${{ matrix.service }}:${{ github.sha }}
          docker push $DOCKER_USER/skillpulse-${{ matrix.service }}:latest

  update-deployment:
    name: build / update-deployment
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Update backend and frontend image tags
        run: |
          sed -i "s|image: .*skillpulse-backend:.*|image: $DOCKER_USER/skillpulse-backend:${{ github.sha }}|" k8s/20-backend.yaml
          sed -i "s|image: .*skillpulse-frontend:.*|image: $DOCKER_USER/skillpulse-frontend:${{ github.sha }}|" k8s/30-frontend.yaml

      - name: Commit GitOps manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi
          git add k8s/20-backend.yaml k8s/30-frontend.yaml
          git commit -m "deploy: update SkillPulse images to ${GITHUB_SHA:0:7}"
          git push origin HEAD:${{ github.ref_name }}

  trivy:
    name: trivy / scan-${{ matrix.service }}
    runs-on: ubuntu-latest
    needs:
      - update-deployment
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USER }}/skillpulse-${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
