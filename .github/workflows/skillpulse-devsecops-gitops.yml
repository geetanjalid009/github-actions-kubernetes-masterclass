name: SkillPulse DevSecOps GitOps Pipeline

on:
  push:
    branches:
      - main
      - skillpulse-end-to-end-devops

env:
  DOCKER_USER: geetanjalid009

jobs:

# =========================================================
# BACKEND CI
# =========================================================

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Distroless Image
        run: |
          docker build \
          -t $DOCKER_USER/skillpulse-backend:${{ github.sha }} \
          -t $DOCKER_USER/skillpulse-backend:latest \
          ./backend

      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USER }}/skillpulse-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'

      - name: Push Backend Image
        run: |
          docker push $DOCKER_USER/skillpulse-backend:${{ github.sha }}
          docker push $DOCKER_USER/skillpulse-backend:latest

# =========================================================
# FRONTEND CI
# =========================================================

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend Image
        run: |
          docker build \
          -t $DOCKER_USER/skillpulse-frontend:${{ github.sha }} \
          -t $DOCKER_USER/skillpulse-frontend:latest \
          ./frontend

      - name: Trivy Frontend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USER }}/skillpulse-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'

      - name: Push Frontend Image
        run: |
          docker push $DOCKER_USER/skillpulse-frontend:${{ github.sha }}
          docker push $DOCKER_USER/skillpulse-frontend:latest

# =========================================================
# DATABASE VALIDATION
# =========================================================

  db-validation:
    name: Kubernetes & DB Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
          | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes YAML
        run: |
           kubeconform \
             k8s/00-namespace.yaml \
             k8s/10-mysql.yaml \
             k8s/20-backend.yaml \
             k8s/30-frontend.yaml

# =========================================================
# SECURITY SUMMARY
# =========================================================

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest

    needs:
      - backend-ci
      - frontend-ci
      - db-validation

    steps:
      - name: Security Validation Complete
        run: |
          echo "All scans and validations passed."

# =========================================================
# GITOPS MANIFEST UPDATE
# =========================================================

  update-k8s-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest

    needs:
      - security-summary

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Backend Image
        run: |
          sed -i "s|image: .*skillpulse-backend:.*|image: geetanjalid009/skillpulse-backend:${{ github.sha }}|" k8s/20-backend.yaml

      - name: Update Frontend Image
        run: |
          sed -i "s|image: .*skillpulse-frontend:.*|image: geetanjalid009/skillpulse-frontend:${{ github.sha }}|" k8s/30-frontend.yaml

      - name: Commit Manifest Changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add .

          git commit -m "Updated images to ${{ github.sha }}" || echo "No changes"

          git push
